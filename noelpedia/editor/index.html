<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noelpedia editor</title>
    <link rel="stylesheet" href="style.css">
    <script src="editor.js" defer></script>
</head>
<body class="editor">
    <label>Title: <input></label>
    <hr>
    <label>Body: </label>
    <ul class="toolbar">
        <li><button onclick="format('bold')">Bold</button></li>
        <li><button onclick="format('italic')">Italic</button></li>
        <li><button onclick="format('link')">Link</button></li>
    </ul>
    <textarea id="body"></textarea>
    <button id="submit">Submit</button>
</body>
</html>
