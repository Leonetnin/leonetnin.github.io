<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragging it</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="settings">
        <p>Speed:</p>
        <input type="range" onload="this.value='0.5'" max="1" min="0" step="0.001" oninput="speed=this.value; document.getElementById('value').innerText=this.value">
        <p id="value">0.15</p>
    </div>
    <img src="plane.png" alt="plane" width="100px" class="drag" draggable="false">
    <img src="plane.png" alt="plane" width="100px" class="drag" draggable="false">
    <p class="drag">Hej</p>
</body>
</html>
