<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Quiz</h1>
    <p>Loading...</p>
    <input>
    <table>
        <tr><th colspan="100%">Stats</th></tr>
        <tr><th>Correct</th><td id="correct">0/0 (?%)</td></tr>
    </table>
    <hr>
    <h2>Settings</h3>
    <div>
        <h3>Include:</h3>
        <label>Control:</label>
        <input id="control" type="checkbox" checked>
        <br>
        <label>Alphabet:</label>
        <input id="alphabet" type="checkbox" checked>
        <br>
        <label>Numbers:</label>
        <input id="numbers" type="checkbox" checked>
        <br>
        <label>Symbols:</label>
        <input id="symbols" type="checkbox" checked>
        <h3>Gamemode:</h3>
        <label>Reverse:</label>
        <input id="reverse" type="checkbox">
    </div>
</body>
</html>
